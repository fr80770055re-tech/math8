<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作業繳交小幫手 - 數學出題</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .math-font { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 1.3rem; 
            line-height: 1.3;
            letter-spacing: 0.1em;
            white-space: pre; 
        }
        body { margin: 0; overflow-x: hidden; background-color: #f8fafc; }
        
        .detail-hidden { display: none; }
        .detail-show { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-gray-800 font-sans flex flex-col min-h-screen" onload="initApp()">

    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center px-6">
        <div class="flex items-center gap-3">
            <span class="text-2xl">📖</span>
            <h1 class="text-xl font-bold tracking-wider">作業繳交小幫手</h1>
        </div>
        <div class="text-sm font-medium opacity-80" id="countDisplay">
            累積出題：0 次
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full p-6 flex-1 flex flex-col gap-5">
        
        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex flex-wrap gap-6 items-center">
                <div class="flex items-center gap-2">
                    <span class="text-gray-600 font-bold">題型：</span>
                    <select id="modeSelect" class="border border-gray-300 rounded-md px-3 py-1.5 outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="mix">混合模式 (乘除各半)</option>
                        <option value="mul">純乘法練習</option>
                        <option value="div">純除法練習</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 text-gray-600 font-bold">
                    位數：
                    <select id="d1Select" class="border rounded px-2 py-1">
                        <option value="3">3位</option><option value="4">4位</option><option value="5">5位</option>
                    </select>
                    <span class="text-lg mx-1">÷/×</span>
                    <select id="d2Select" class="border rounded px-2 py-1">
                        <option value="1">1位</option><option value="2" selected>2位</option><option value="3">3位</option>
                    </select>
                </div>
            </div>
            <button onclick="generateAll()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-bold transition shadow-sm">
                ＋ 重新出題 (8題)
            </button>
        </div>

        <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl flex gap-4 items-center shadow-sm">
            <button onclick="saveCurrentToHistory()" class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow transition flex-shrink-0">
                💾 儲存目前這組題目
            </button>
            <div class="w-px h-8 bg-indigo-200 mx-2"></div>
            <div class="text-sm text-indigo-800 font-bold flex-shrink-0">讀取存檔：</div>
            <div id="historyContainer" class="flex flex-wrap gap-2 items-center flex-1">
                </div>
        </div>

        <div id="quizContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        
    </main>

    <script>
        let questions = [];
        let practiceCount = parseInt(localStorage.getItem('math_pure_count') || '0');
        let historyRecords = JSON.parse(localStorage.getItem('math_snapshots') || '[]');

        function initApp() {
            document.getElementById('countDisplay').innerText = `累積出題：${practiceCount} 次`;
            renderHistory();
            generateAll();
        }

        function generateNum(digits) {
            const min = Math.pow(10, digits - 1);
            const max = Math.pow(10, digits) - 1;
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateAll() {
            const mode = document.getElementById('modeSelect').value;
            const d1 = parseInt(document.getElementById('d1Select').value);
            const d2 = parseInt(document.getElementById('d2Select').value);

            questions = [];
            for (let i = 0; i < 8; i++) {
                const type = mode === 'mix' ? (i < 4 ? 'mul' : 'div') : mode;
                questions.push({
                    id: Math.random().toString(36).substring(2, 9),
                    type: type, n1: generateNum(d1), n2: generateNum(d2), show: false,
                    label: `第 ${String(i + 1).padStart(2, '0')} 題`
                });
            }

            practiceCount++;
            localStorage.setItem('math_pure_count', practiceCount);
            document.getElementById('countDisplay').innerText = `累積出題：${practiceCount} 次`;
            renderAll();
        }

        function refreshOne(event, index) {
            event.stopPropagation();
            const mode = document.getElementById('modeSelect').value;
            const d1 = parseInt(document.getElementById('d1Select').value);
            const d2 = parseInt(document.getElementById('d2Select').value);
            const type = mode === 'mix' ? (index < 4 ? 'mul' : 'div') : mode;

            questions[index] = {
                id: Math.random().toString(36).substring(2, 9),
                type: type, n1: generateNum(d1), n2: generateNum(d2), show: false,
                label: `第 ${String(index + 1).padStart(2, '0')} 題`
            };
            renderAll();
        }

        function saveCurrentToHistory() {
            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            
            const record = {
                id: Date.now(),
                time: timeStr,
                data: JSON.parse(JSON.stringify(questions))
            };
            
            historyRecords.unshift(record);
            if (historyRecords.length > 8) historyRecords.pop();
            
            localStorage.setItem('math_snapshots', JSON.stringify(historyRecords));
            renderHistory();
        }

        function loadHistory(id) {
            const record = historyRecords.find(r => r.id === id);
            if (record) {
                questions = JSON.parse(JSON.stringify(record.data)).map(q => ({...q, show: false}));
                renderAll();
            }
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            if (historyRecords.length === 0) {
                container.innerHTML = '<span class="text-indigo-300 text-sm">尚無存檔</span>';
                return;
            }
            container.innerHTML = historyRecords.map((r) => `
                <button onclick="loadHistory(${r.id})" class="text-xs bg-white text-indigo-600 border border-indigo-200 px-3 py-1.5 rounded-full hover:bg-indigo-600 hover:text-white transition shadow-sm font-bold">
                    🕒 ${r.time} 紀錄
                </button>
            `).join('');
        }

        function toggleShow(index) {
            questions[index].show = !questions[index].show;
            renderAll();
        }

        // ================= 進位移至頂部的對齊演算法 =================
        function buildMulHTML(n1, n2, show) {
            const n1Str = n1.toString();
            const n2Str = n2.toString();
            const ansStr = (n1 * n2).toString();
            const width = Math.max(n1Str.length, n2Str.length + 2, ansStr.length);
            
            let carryHTML = "";
            let detail = "";
            const s2 = n2Str.split('').reverse();
            let validSteps = 0;
            
            for(let i=0; i<s2.length; i++) {
                if(s2[i] !== '0') {
                    const digitB = parseInt(s2[i]);
                    const product = n1 * digitB;
                    const prodStr = product.toString();
                    
                    // 1. 計算頂部進位列
                    let carryArr = new Array(n1Str.length).fill(" ");
                    let currentCarry = 0;
                    for (let k = n1Str.length - 1; k >= 0; k--) {
                        let digitA = parseInt(n1Str[k]);
                        let prod = digitA * digitB + currentCarry;
                        let nextCarry = Math.floor(prod / 10);
                        if (k - 1 >= 0 && nextCarry > 0) {
                            carryArr[k - 1] = nextCarry.toString();
                        }
                        currentCarry = nextCarry;
                    }
                    let carryStr = carryArr.join('');
                    
                    if (carryStr.trim().length > 0) {
                       // 讓進位與被乘數對齊，並將每一次的進位列「向上堆疊」(prepend)
                       let padLeft = width - n1Str.length;
                       carryHTML = `<div class="text-red-500 font-bold">` + " ".repeat(Math.max(0, padLeft)) + carryStr + `</div>` + carryHTML;
                    }
                    
                    // 2. 紀錄中間乘積
                    const padLeft = width - i - prodStr.length;
                    detail += " ".repeat(Math.max(0, padLeft)) + prodStr + " ".repeat(i) + "\n";
                    validSteps++;
                }
            }
            
            // 3. 組合 HTML：先放頂部進位，再放原題目，最後放中間計算過程
            let carryContainer = carryHTML !== "" ? `<div class="${show ? 'detail-show' : 'detail-hidden'}">${carryHTML}</div>` : "";
            
            let baseMath = `<div>` + 
                           " ".repeat(width - n1Str.length) + n1Str + "\n" +
                           " ".repeat(width - n2Str.length - 2) + "× " + n2Str + "\n" +
                           "-".repeat(width) + `</div>`;
            
            if (validSteps > 1) {
                detail += "-".repeat(width) + "\n";
                detail += `<span class="text-blue-600 font-bold">` + " ".repeat(width - ansStr.length) + ansStr + `</span>\n`;
            } else {
                detail += `<span class="text-blue-600 font-bold">` + " ".repeat(width - ansStr.length) + ansStr + `</span>\n`;
            }

            return `<div class="math-font flex flex-col items-center w-full px-4"><div class="text-left">${carryContainer}${baseMath}<div class="${show ? 'detail-show' : 'detail-hidden'} text-gray-600">${detail}</div></div></div>`;
        }

        function buildDivHTML(n1, n2, show) {
            const q = Math.floor(n1 / n2).toString();
            const n1Str = n1.toString();
            const n2Str = n2.toString();
            const preLen = n2Str.length + 3; 
            
            let outTop = "";
            const qPad = preLen + n1Str.length - q.length;
            outTop += `<div class="${show ? 'opacity-100' : 'opacity-0'} text-blue-600 font-bold transition-opacity">` + " ".repeat(qPad) + q + "</div>";
            
            let outBase = "";
            outBase += " ".repeat(preLen) + "-".repeat(n1Str.length) + "\n";
            outBase += n2Str + " ) " + n1Str + "\n";
            
            let detail = "";
            let cv = "";
            let stepsCount = 0;
            
            for (let i = 0; i < n1Str.length; i++) {
                cv += n1Str[i];
                let cvNum = parseInt(cv, 10);
                
                if (cvNum >= n2 || (i === n1Str.length - 1 && stepsCount > 0)) {
                    let sub = Math.floor(cvNum / n2) * n2;
                    if (sub > 0 || i === n1Str.length - 1) {
                        let subStr = sub.toString();
                        if (sub > 0) {
                            let subPad = preLen + i + 1 - subStr.length;
                            detail += " ".repeat(subPad) + subStr + "\n";
                            
                            let dashLen = Math.max(cv.length, subStr.length);
                            let dashPad = preLen + i + 1 - dashLen;
                            detail += " ".repeat(dashPad) + "-".repeat(dashLen) + "\n";
                            
                            cv = (cvNum - sub).toString();
                            if (cv === "0") cv = ""; 
                        }
                        
                        if (i < n1Str.length - 1) {
                            let displayCv = cv + n1Str[i+1];
                            let dropPad = preLen + i + 2 - displayCv.length;
                            detail += " ".repeat(dropPad) + displayCv + "\n";
                            stepsCount++;
                        } else {
                            let displayCv = cv === "" ? "0" : cv;
                            let remPad = preLen + i + 1 - displayCv.length;
                            detail += " ".repeat(remPad) + displayCv + "\n";
                        }
                    }
                } else if (i < n1Str.length - 1 && stepsCount > 0) {
                     let displayCv = parseInt(cv + n1Str[i+1], 10).toString(); 
                     let dropPad = preLen + i + 2 - displayCv.length;
                     detail += " ".repeat(dropPad) + displayCv + "\n";
                }
            }

            return `<div class="math-font flex flex-col items-center w-full px-4"><div class="text-left">${outTop}${outBase}<div class="${show ? 'detail-show' : 'detail-hidden'} text-gray-600">${detail}</div></div></div>`;
        }

        function renderAll() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = '';

            questions.forEach((q, index) => {
                const mathContent = q.type === 'mul' ? buildMulHTML(q.n1, q.n2, q.show) : buildDivHTML(q.n1, q.n2, q.show);
                
                const cardHtml = `
                    <div onclick="toggleShow(${index})" class="bg-white border border-gray-200 rounded-xl p-5 min-h-[400px] shadow-sm hover:border-blue-400 hover:shadow-md transition-all cursor-pointer flex flex-col relative group">
                        <div class="flex justify-between items-center border-b border-gray-100 pb-2 mb-4">
                            <span class="text-blue-600 font-bold text-sm bg-blue-50 border border-blue-100 px-2 py-1 rounded shadow-sm">${q.label}</span>
                            <button onclick="refreshOne(event, ${index})" class="text-gray-400 hover:text-blue-600 hover:bg-gray-100 p-1.5 rounded transition opacity-0 group-hover:opacity-100" title="單獨更換此題數字">🔄</button>
                        </div>
                        
                        <div class="flex-1 flex justify-center w-full">
                            ${mathContent}
                        </div>

                        <div class="mt-4 pt-3 border-t border-gray-50 text-center text-xs text-gray-400">
                            點擊卡片空白處顯示 / 隱藏詳解 (頂部進位)
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }
    </script>
</body>
</html>
